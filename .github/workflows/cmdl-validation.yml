name: CMDL Validation

on:
  push:
    paths:
      - 'questionnaire-engine/**'
      - '.github/workflows/cmdl-validation.yml'
  pull_request:
    paths:
      - 'questionnaire-engine/**'
      - '.github/workflows/cmdl-validation.yml'

jobs:
  validate-cmdl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate CMDL examples
        run: node questionnaire-engine/tools/validate-cmdl.mjs

      - name: Generate sample response CSV suite
        run: node questionnaire-engine/tools/generate-sample-response-csvs.mjs questionnaire-engine/cmdl/examples /tmp/cap-method-response-samples

      - name: Import sample FORM-001 response
        run: node questionnaire-engine/tools/import-response-csv.mjs questionnaire-engine/cmdl/examples/FORM-001.cmdl.yaml /tmp/cap-method-response-samples/FORM-001.responses.sample.csv /tmp/FORM-001.response.normalized.json

      - name: Check normalized FORM-001 response
        run: |
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/FORM-001.response.normalized.json', 'utf8')); if (data.formId !== 'FORM-001') throw new Error('Invalid formId'); if (data.import.status !== 'success') throw new Error('Import status is not success'); if (!Array.isArray(data.answers) || data.answers.length === 0) throw new Error('No normalized answers'); if (!data.answers.every(answer => answer.formId === 'FORM-001')) throw new Error('Invalid answer formId'); if (!data.answers.every(answer => typeof answer.questionId === 'string' && answer.questionId.length > 0)) throw new Error('Missing questionId');"

      - name: Import sample response session
        run: node questionnaire-engine/tools/import-response-session.mjs questionnaire-engine/cmdl/examples /tmp/cap-method-response-samples /tmp/session.response.normalized.json

      - name: Check normalized response session
        run: |
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/session.response.normalized.json', 'utf8')); if (data.import.formsExpected !== 10) throw new Error('Expected 10 forms'); if (data.import.formsImported !== 10) throw new Error('Expected 10 imported forms'); if (data.completeness.complete !== true) throw new Error('Session is not complete'); if (data.analysisReadiness.ready !== true) throw new Error('Session is not analysis-ready'); if (data.import.status !== 'success') throw new Error('Session import status is not success');"

      - name: Generate analysis snapshot
        run: node questionnaire-engine/tools/analyze-response-session.mjs /tmp/session.response.normalized.json /tmp/sample.analysis-snapshot.json

      - name: Check analysis snapshot
        run: |
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/sample.analysis-snapshot.json', 'utf8')); if (data.status !== 'ready_for_consultant_review') throw new Error('Analysis snapshot is not ready'); if (!Array.isArray(data.indicators) || data.indicators.length === 0) throw new Error('Missing indicators'); if (!Array.isArray(data.consultantPrompts) || data.consultantPrompts.length === 0) throw new Error('Missing consultant prompts'); if (data.coverage.formsImported !== 10) throw new Error('Invalid coverage');"

      - name: Generate AI analysis draft
        run: node questionnaire-engine/tools/generate-ai-analysis-draft.mjs /tmp/sample.analysis-snapshot.json /tmp/sample.ai-analysis-draft.md

      - name: Validate AI analysis draft
        run: node questionnaire-engine/tools/validate-ai-analysis-draft.mjs /tmp/sample.ai-analysis-draft.md

      - name: Check AI analysis draft content
        run: |
          grep -q "# Analyse IA assistée" /tmp/sample.ai-analysis-draft.md
          grep -q "## Avertissement méthodologique" /tmp/sample.ai-analysis-draft.md
          grep -q "## Validation consultant obligatoire" /tmp/sample.ai-analysis-draft.md
          grep -q "deterministic-local-draft" /tmp/sample.ai-analysis-draft.md

      - name: Generate synthesis draft
        run: node questionnaire-engine/tools/generate-synthesis-draft.mjs /tmp/sample.analysis-snapshot.json /tmp/sample.synthesis-draft.md

      - name: Check synthesis draft
        run: |
          grep -q "# Brouillon de synthèse consultant" /tmp/sample.synthesis-draft.md
          grep -q "## Indicateurs principaux" /tmp/sample.synthesis-draft.md
          grep -q "## Questions de préparation pour le consultant" /tmp/sample.synthesis-draft.md
          grep -q "## Décision de suite" /tmp/sample.synthesis-draft.md

      - name: Generate final synthesis
        run: node questionnaire-engine/tools/generate-final-synthesis.mjs /tmp/sample.analysis-snapshot.json /tmp/sample.synthesis-draft.md /tmp/sample.final-synthesis.md

      - name: Check final synthesis
        run: |
          grep -q "# Synthèse finale structurée" /tmp/sample.final-synthesis.md
          grep -q "## 1. Rappel du contexte" /tmp/sample.final-synthesis.md
          grep -q "## 4. Compétences identifiées" /tmp/sample.final-synthesis.md
          grep -q "## 8. Projet retenu" /tmp/sample.final-synthesis.md
          grep -q "## 11. Points à valider avant remise" /tmp/sample.final-synthesis.md

      - name: Generate action plan
        run: node questionnaire-engine/tools/generate-action-plan.mjs /tmp/sample.analysis-snapshot.json /tmp/sample.final-synthesis.md /tmp/sample.action-plan.md

      - name: Check action plan
        run: |
          grep -q "# Plan d action professionnel" /tmp/sample.action-plan.md
          grep -q "## 1. Projet professionnel cible" /tmp/sample.action-plan.md
          grep -q "## 4. Actions court terme - 0 à 30 jours" /tmp/sample.action-plan.md
          grep -q "## 10. Contraintes et points de vigilance" /tmp/sample.action-plan.md
          grep -q "## 14. Validation du plan" /tmp/sample.action-plan.md

      - name: Generate deliverables end-to-end
        run: node questionnaire-engine/tools/generate-deliverables.mjs questionnaire-engine/cmdl/examples /tmp/cap-method-response-samples /tmp/cap-method-deliverables

      - name: Check deliverables manifest
        run: |
          test -f /tmp/cap-method-deliverables/response-session.json
          test -f /tmp/cap-method-deliverables/analysis-snapshot.json
          test -f /tmp/cap-method-deliverables/synthesis-draft.md
          test -f /tmp/cap-method-deliverables/final-synthesis.md
          test -f /tmp/cap-method-deliverables/action-plan.md
          test -f /tmp/cap-method-deliverables/manifest.json
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/cap-method-deliverables/manifest.json', 'utf8')); if (data.status !== 'generated') throw new Error('Deliverables were not generated'); if (!data.files.finalSynthesis || !data.files.actionPlan) throw new Error('Missing deliverable file references'); if (data.coverage.formsImported !== 10) throw new Error('Invalid deliverable coverage');"

      - name: Prepare deliverable package
        run: node questionnaire-engine/tools/prepare-deliverable-package.mjs /tmp/cap-method-deliverables /tmp/cap-method-packages 0.1.0

      - name: Check prepared deliverable package
        run: |
          test -d /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/source
          test -d /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/exports
          test -d /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/review
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/source/response-session.json
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/source/analysis-snapshot.json
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/source/final-synthesis.md
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/source/action-plan.md
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/review/consultant-review.md
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/review/beneficiary-validation.md
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/manifest.json
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/manifest.json', 'utf8')); if (data.reviewStatus !== 'generated') throw new Error('Invalid review status'); if (data.packageVersion !== '0.1.0') throw new Error('Invalid package version'); if (!data.checks.markdownGenerated) throw new Error('Markdown check should be true'); if (data.checks.readyForDelivery) throw new Error('Package should not be ready for delivery yet');"

      - name: Generate DOCX exports
        run: node questionnaire-engine/tools/export-docx.mjs /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session

      - name: Check DOCX exports
        run: |
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/exports/CAP-SYNTHESE-FINALE.docx
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/exports/CAP-PLAN-ACTION.docx
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/manifest.json', 'utf8')); if (!data.checks.exportsGenerated) throw new Error('Exports should be marked as generated'); if (!data.checks.docxStyled) throw new Error('DOCX styling should be marked as enabled'); if (!data.files.exports.finalSynthesisDocx) throw new Error('Missing final synthesis DOCX reference'); if (!data.files.exports.actionPlanDocx) throw new Error('Missing action plan DOCX reference');"
          node -e "const fs = require('fs'); for (const file of ['/tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/exports/CAP-SYNTHESE-FINALE.docx', '/tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/exports/CAP-PLAN-ACTION.docx']) { const buffer = fs.readFileSync(file); if (buffer.readUInt32LE(0) !== 0x04034b50) throw new Error('Invalid DOCX zip header: ' + file); }"
          unzip -p /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/exports/CAP-SYNTHESE-FINALE.docx word/styles.xml | grep -q "CapSubtitle"
          unzip -p /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/exports/CAP-SYNTHESE-FINALE.docx word/styles.xml | grep -q "CapChecklist"

      - name: Generate PDF exports
        run: node questionnaire-engine/tools/export-pdf.mjs /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session

      - name: Check PDF exports
        run: |
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/exports/CAP-SYNTHESE-FINALE.pdf
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/exports/CAP-PLAN-ACTION.pdf
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/manifest.json', 'utf8')); if (!data.checks.pdfGenerated) throw new Error('PDF exports should be marked as generated'); if (!data.files.exports.finalSynthesisPdf) throw new Error('Missing final synthesis PDF reference'); if (!data.files.exports.actionPlanPdf) throw new Error('Missing action plan PDF reference');"
          node -e "const fs = require('fs'); for (const file of ['/tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/exports/CAP-SYNTHESE-FINALE.pdf', '/tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/exports/CAP-PLAN-ACTION.pdf']) { const buffer = fs.readFileSync(file); if (buffer.subarray(0, 5).toString('utf8') !== '%PDF-') throw new Error('Invalid PDF header: ' + file); }"

      - name: Generate final ZIP package
        run: node questionnaire-engine/tools/package-deliverables.mjs /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session /tmp/cap-method-packages

      - name: Check final ZIP package
        run: |
          test -f /tmp/cap-method-packages/CAP-DELIVERABLES-sample-session.zip
          node -e "const fs = require('fs'); const zip = fs.readFileSync('/tmp/cap-method-packages/CAP-DELIVERABLES-sample-session.zip'); if (zip.readUInt32LE(0) !== 0x04034b50) throw new Error('Invalid ZIP header'); const data = JSON.parse(fs.readFileSync('/tmp/cap-method-packages/CAP-DELIVERABLES-sample-session/manifest.json', 'utf8')); if (!data.checks.packageGenerated) throw new Error('Package should be marked as generated'); if (!data.checks.readyForDelivery) throw new Error('Package should be ready for delivery'); if (!data.files.packageZip) throw new Error('Missing ZIP reference');"
