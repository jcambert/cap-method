name: CMDL Validation

on:
  push:
    paths:
      - 'questionnaire-engine/**'
      - '.github/workflows/cmdl-validation.yml'
  pull_request:
    paths:
      - 'questionnaire-engine/**'
      - '.github/workflows/cmdl-validation.yml'

jobs:
  validate-cmdl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate CMDL examples
        run: node questionnaire-engine/tools/validate-cmdl.mjs

      - name: Import sample FORM-001 response
        run: node questionnaire-engine/tools/import-response-csv.mjs questionnaire-engine/cmdl/examples/FORM-001.cmdl.yaml questionnaire-engine/responses/samples/FORM-001.responses.sample.csv /tmp/FORM-001.response.normalized.json

      - name: Check normalized FORM-001 response
        run: |
          grep -q '"formId": "FORM-001"' /tmp/FORM-001.response.normalized.json
          grep -q '"questionId": "Q001"' /tmp/FORM-001.response.normalized.json
          grep -q '"questionId": "Q023"' /tmp/FORM-001.response.normalized.json
          grep -q '"status": "success"' /tmp/FORM-001.response.normalized.json
