name: CMDL Validation

on:
  push:
    paths:
      - 'questionnaire-engine/**'
      - '.github/workflows/cmdl-validation.yml'
  pull_request:
    paths:
      - 'questionnaire-engine/**'
      - '.github/workflows/cmdl-validation.yml'

jobs:
  validate-cmdl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate CMDL examples
        run: node questionnaire-engine/tools/validate-cmdl.mjs

      - name: Generate sample response CSV suite
        run: node questionnaire-engine/tools/generate-sample-response-csvs.mjs questionnaire-engine/cmdl/examples /tmp/cap-method-response-samples

      - name: Import sample FORM-001 response
        run: node questionnaire-engine/tools/import-response-csv.mjs questionnaire-engine/cmdl/examples/FORM-001.cmdl.yaml /tmp/cap-method-response-samples/FORM-001.responses.sample.csv /tmp/FORM-001.response.normalized.json

      - name: Check normalized FORM-001 response
        run: |
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/FORM-001.response.normalized.json', 'utf8')); if (data.formId !== 'FORM-001') throw new Error('Invalid formId'); if (data.import.status !== 'success') throw new Error('Import status is not success'); if (!Array.isArray(data.answers) || data.answers.length === 0) throw new Error('No normalized answers'); if (!data.answers.every(answer => answer.formId === 'FORM-001')) throw new Error('Invalid answer formId'); if (!data.answers.every(answer => typeof answer.questionId === 'string' && answer.questionId.length > 0)) throw new Error('Missing questionId');"

      - name: Import sample response session
        run: node questionnaire-engine/tools/import-response-session.mjs questionnaire-engine/cmdl/examples /tmp/cap-method-response-samples /tmp/session.response.normalized.json

      - name: Check normalized response session
        run: |
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/session.response.normalized.json', 'utf8')); if (data.import.formsExpected !== 10) throw new Error('Expected 10 forms'); if (data.import.formsImported !== 10) throw new Error('Expected 10 imported forms'); if (data.completeness.complete !== true) throw new Error('Session is not complete'); if (data.analysisReadiness.ready !== true) throw new Error('Session is not analysis-ready'); if (data.import.status !== 'success') throw new Error('Session import status is not success');"

      - name: Generate analysis snapshot
        run: node questionnaire-engine/tools/analyze-response-session.mjs /tmp/session.response.normalized.json /tmp/sample.analysis-snapshot.json

      - name: Check analysis snapshot
        run: |
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/sample.analysis-snapshot.json', 'utf8')); if (data.status !== 'ready_for_consultant_review') throw new Error('Analysis snapshot is not ready'); if (!Array.isArray(data.indicators) || data.indicators.length === 0) throw new Error('Missing indicators'); if (!Array.isArray(data.consultantPrompts) || data.consultantPrompts.length === 0) throw new Error('Missing consultant prompts'); if (data.coverage.formsImported !== 10) throw new Error('Invalid coverage');"
