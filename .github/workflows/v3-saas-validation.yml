name: v3-saas-validation

on:
  push:
    branches:
      - main
      - test/v3-1-hardening-from-main
  pull_request:
    branches:
      - main
    paths:
      - 'src/CapMethod.Saas/**'
      - 'docs/30_release_v3_0_saas/**'
      - 'docs/31_release_v3_1_production_ready/**'
      - '.github/workflows/v3-saas-validation.yml'

jobs:
  build-test:
    name: Build and test v3 SaaS
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore solution
        run: dotnet restore src/CapMethod.Saas/CapMethod.Saas.slnx

      - name: Build solution
        run: dotnet build src/CapMethod.Saas/CapMethod.Saas.slnx --no-restore

      - name: Test domain
        run: dotnet test src/CapMethod.Saas/CapMethod.Saas.Domain.Tests/CapMethod.Saas.Domain.Tests.csproj --no-build --logger trx --collect:"XPlat Code Coverage"

      - name: Test application
        run: dotnet test src/CapMethod.Saas/CapMethod.Saas.Application.Tests/CapMethod.Saas.Application.Tests.csproj --no-build --logger trx --collect:"XPlat Code Coverage"

      - name: Test infrastructure
        run: dotnet test src/CapMethod.Saas/CapMethod.Saas.Infrastructure.Tests/CapMethod.Saas.Infrastructure.Tests.csproj --no-build --logger trx --collect:"XPlat Code Coverage"

      - name: Test compatibility
        run: dotnet test src/CapMethod.Saas/CapMethod.Saas.Compatibility.Tests/CapMethod.Saas.Compatibility.Tests.csproj --no-build --logger trx --collect:"XPlat Code Coverage"

      - name: Test server API
        run: dotnet test src/CapMethod.Saas/CapMethod.Saas.Server.Tests/CapMethod.Saas.Server.Tests.csproj --no-build --logger trx --collect:"XPlat Code Coverage"

      - name: Test Aspire distributed application
        run: dotnet test src/CapMethod.Saas/CapMethod.Saas.Aspire.Tests/CapMethod.Saas.Aspire.Tests.csproj --no-build --logger trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v3-saas-test-results
          path: |
            **/*.trx
            **/coverage.cobertura.xml