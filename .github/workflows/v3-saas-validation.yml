name: v3-saas-validation

on:
  push:
    branches:
      - feature/v3-1-lot8-editable-synthesis
  pull_request:
    branches:
      - main
    paths:
      - 'src/CapMethod.Saas/**'
      - 'docs/30_release_v3_0_saas/**'
      - 'docs/31_release_v3_1_production_ready/**'
      - '.github/workflows/v3-saas-validation.yml'

jobs:
  build-test:
    name: Build and test v3 SaaS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore solution
        run: dotnet restore src/CapMethod.Saas/CapMethod.Saas.slnx

      - name: Build solution
        run: dotnet build src/CapMethod.Saas/CapMethod.Saas.slnx --no-restore

      - name: Test domain
        run: dotnet test src/CapMethod.Saas/CapMethod.Saas.Domain.Tests/CapMethod.Saas.Domain.Tests.csproj --no-restore --logger trx

      - name: Test application
        run: dotnet test src/CapMethod.Saas/CapMethod.Saas.Application.Tests/CapMethod.Saas.Application.Tests.csproj --no-restore --logger trx

      - name: Test infrastructure
        run: dotnet test src/CapMethod.Saas/CapMethod.Saas.Infrastructure.Tests/CapMethod.Saas.Infrastructure.Tests.csproj --no-restore --logger trx

      - name: Test compatibility
        run: dotnet test src/CapMethod.Saas/CapMethod.Saas.Compatibility.Tests/CapMethod.Saas.Compatibility.Tests.csproj --no-restore --logger trx
